<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- v2 · 2026-07-11 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ 暑假计划表 2026 · 7.11 — 8.29</title>
<style>
  :root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --text: #1f2937;
    --text2: #6b7280;
    --border: #e5e7eb;
    --pri: #5b6fff;
    --pri-light: #eef0ff;
    --done: #10b981;
    --done-bg: #ecfdf5;
    --warn: #f59e0b;
    --phase1: #5b6fff;
    --phase2: #7c3aed;
    --phase3: #f59e0b;
    --phase4: #0891b2;
    --phase5: #ef4444;
    --phase6: #10b981;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    font-size: 16px;
  }

  /* ── Header ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 span { font-size: 1.6rem; }

  /* ── Phase indicator ── */
  .phase-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: .82rem;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    min-height: calc(100vh - 72px);
  }

  /* ── Sidebar: date list ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 72px);
    position: sticky;
    top: 72px;
    padding: 8px 0;
  }
  .sidebar .month-label {
    padding: 10px 20px 4px;
    font-size: .75rem;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .date-row {
    display: flex;
    align-items: center;
    padding: 8px 20px;
    cursor: pointer;
    transition: background .15s;
    gap: 10px;
    border-left: 3px solid transparent;
    font-size: .9rem;
  }
  .date-row:hover { background: #f9fafb; }
  .date-row.active {
    background: var(--pri-light);
    border-left-color: var(--pri);
    font-weight: 600;
  }
  .date-row .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .date-row .dot.full  { background: var(--done); }
  .date-row .dot.part  { background: var(--warn); }
  .date-row .dot.none  { background: #e5e7eb; }
  .date-row .dot.future{ background: transparent; border: 1.5px solid #d1d5db; }

  .date-row .day-num { font-weight: 500; min-width: 1.8em; }
  .date-row .weekday { color: var(--text2); font-size: .78rem; }

  /* ── Main ── */
  .main {
    flex: 1;
    padding: 28px 40px;
    max-width: 860px;
  }

  /* ── Date header ── */
  .date-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .date-header .big-date {
    font-size: 1.7rem;
    font-weight: 700;
  }
  .date-header .big-weekday {
    font-size: 1rem;
    color: var(--text2);
  }
  .nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all .15s;
  }
  .nav-btn:hover { background: var(--pri-light); border-color: var(--pri); }

  /* ── Daily quote bar ── */
  .quote-bar {
    background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 100%);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: .9rem;
    color: #4b5563;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--pri);
  }
  .quote-bar .quote-icon { font-size: 1.3rem; flex-shrink: 0; }
  .quote-bar .quote-text { flex: 1; font-style: italic; line-height: 1.5; }
  .quote-bar .chassis-progress {
    font-size: .78rem;
    color: var(--pri);
    font-weight: 600;
    white-space: nowrap;
    margin-top: 2px;
  }

  /* ── Task card ── */
  .task-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .task-card h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #f3f4f6;
    transition: opacity .2s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item.done .task-label { text-decoration: line-through; color: #9ca3af; }

  .task-check {
    appearance: none;
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border: 2px solid #d1d5db;
    border-radius: 7px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all .2s;
    position: relative;
  }
  .task-check:checked {
    background: var(--done);
    border-color: var(--done);
  }
  .task-check:checked::after {
    content: '✓';
    position: absolute;
    top: -1px;
    left: 5px;
    color: #fff;
    font-size: .9rem;
    font-weight: 700;
  }
  .task-label { flex: 1; font-size: .95rem; }
  .task-time {
    font-size: .75rem;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .task-optional {
    font-size: .7rem;
    color: var(--text2);
    background: #f3f4f6;
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  /* ── Progress ── */
  .progress-bar-wrap {
    height: 8px;
    background: #e5e7eb;
    border-radius: 4px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--done);
    border-radius: 4px;
    transition: width .4s;
  }
  .progress-text {
    font-size: .8rem;
    color: var(--text2);
    margin-top: 6px;
  }

  /* ── Review card ── */
  .review-card { margin-top: 20px; }
  .review-card textarea {
    width: 100%;
    min-height: 100px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: .92rem;
    font-family: inherit;
    resize: vertical;
    line-height: 1.6;
    transition: border-color .2s;
    background: #fafbfc;
  }
  .review-card textarea:focus {
    outline: none;
    border-color: var(--pri);
    background: #fff;
    box-shadow: 0 0 0 3px var(--pri-light);
  }
  .review-card textarea::placeholder { color: #c4c9d0; }
  .review-save-hint {
    font-size: .75rem;
    color: var(--text2);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .review-history-toggle {
    font-size: .82rem;
    color: var(--pri);
    cursor: pointer;
    user-select: none;
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .review-history-toggle:hover { text-decoration: underline; }
  .review-history-list {
    margin-top: 8px;
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fafbfc;
  }
  .review-history-item {
    padding: 10px 14px;
    border-bottom: 1px solid #f3f4f6;
    cursor: pointer;
    transition: background .15s;
  }
  .review-history-item:last-child { border-bottom: none; }
  .review-history-item:hover { background: var(--pri-light); }
  .review-history-item .rh-date {
    font-weight: 600;
    font-size: .82rem;
    color: var(--pri);
  }
  .review-history-item .rh-preview {
    font-size: .8rem;
    color: var(--text2);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Heatmap mini ── */
  .heatmap-wrap { margin-top: 20px; }
  .heatmap-wrap h2 {
    font-size: .9rem;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .heatmap { display: flex; flex-wrap: wrap; gap: 3px; }
  .heat-cell {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
  }
  .heat-cell:hover { outline: 2px solid var(--pri); z-index: 2; }
  .heat-cell.full  { background: #10b981; }
  .heat-cell.part  { background: #f59e0b; }
  .heat-cell.none  { background: #e5e7eb; }
  .heat-cell.future{ background: #f9fafb; border: 1px solid #e5e7eb; }

  /* ── Jump to today ── */
  .btn-today {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: .82rem;
    font-weight: 500;
    transition: all .15s;
  }
  .btn-today:hover { background: var(--pri-light); border-color: var(--pri); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      max-height: none;
      position: static;
      display: flex;
      overflow-x: auto;
      gap: 2px;
      padding: 8px 12px;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .sidebar .month-label { display: none; }
    .date-row {
      flex-direction: column;
      padding: 6px 8px;
      gap: 2px;
      border-left: none;
      border-bottom: 3px solid transparent;
      font-size: .75rem;
      min-width: 42px;
      text-align: center;
    }
    .date-row.active { border-left: none; border-bottom-color: var(--pri); }
    .main { padding: 16px; }
    .date-header .big-date { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>☀️</span> 暑假计划表 <span style="font-weight:400;color:var(--text2);font-size:.85rem;">2026.7.11 — 8.29</span></h1>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="phase-tag" id="phaseTag">硬件学习期</span>
    <button class="btn-today" onclick="goToday()">📍 回到今天</button>
    <button class="btn-today" onclick="exportData()" title="导出数据到文件">📤 导出</button>
    <button class="btn-today" onclick="document.getElementById('importFile').click()" title="从文件导入数据">📥 导入</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="layout">

  <!-- Sidebar: date list -->
  <div class="sidebar" id="sidebar"></div>

  <!-- Main -->
  <div class="main">
    <div class="date-header">
      <button class="nav-btn" onclick="shiftDate(-1)" title="前一天">◀</button>
      <span class="big-date" id="bigDate">2026年7月11日</span>
      <span class="big-weekday" id="bigWeekday">星期五</span>
      <button class="nav-btn" onclick="shiftDate(1)" title="后一天">▶</button>
    </div>

    <div class="quote-bar" id="quoteBar">
      <span class="quote-icon">💡</span>
      <span class="quote-text" id="quoteText"></span>
    </div>

    <div class="task-card">
      <h2>📚 今日核心任务</h2>
      <div id="coreTasks"></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="coreBar" style="width:0%"></div></div>
      <div class="progress-text" id="coreProgress">0/0 完成</div>
    </div>

    <div class="task-card">
      <h2>🏃 每日习惯</h2>
      <div id="habitTasks"></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="habitBar" style="width:0%"></div></div>
      <div class="progress-text" id="habitProgress">0/0 完成</div>
    </div>

    <div class="task-card" id="optionalCard" style="display:none;">
      <h2>📋 额外事项</h2>
      <div id="optionalTasks"></div>
    </div>

    <div class="task-card review-card">
      <h2>📝 每日复盘</h2>
      <textarea id="reviewInput" placeholder="今天学到了什么？有什么收获或不足？记录下来以后回看..."></textarea>
      <div class="review-save-hint" id="reviewHint">💾 输入后自动保存</div>
      <span class="review-history-toggle" id="reviewToggle" onclick="toggleReviewHistory()">📅 查看历史复盘 ▸</span>
      <div class="review-history-list" id="reviewHistory" style="display:none;"></div>
    </div>

    <!-- Heatmap -->
    <div class="heatmap-wrap">
      <h2>📊 打卡总览（点击方块可跳转）</h2>
      <div class="heatmap" id="heatmap"></div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:.75rem;color:var(--text2);">
        <span>🟢 全部完成</span><span>🟡 部分完成</span><span>⬜ 未完成</span><span>◻️ 未到来</span>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  DATA: Plan definition
// ═══════════════════════════════════════

const START_DATE = new Date(2026, 6, 11);  // July 11
const END_DATE   = new Date(2026, 7, 29);  // Aug 29 (inclusive)

// Normalize any date to plan year (2026), clamp by month-day
function clampToPlanDate(date) {
  const planDate = new Date(2026, date.getMonth(), date.getDate());
  if (planDate < START_DATE) return new Date(START_DATE);
  if (planDate > END_DATE) return new Date(END_DATE);
  return planDate;
}

// Phase definitions: { start (Date), end (Date), name, color, emoji }
const PHASES = [
  { start: new Date(2026,6,11), end: new Date(2026,6,12), name:'硬件学习期',       color:'#5b6fff', emoji:'🔌' },
  { start: new Date(2026,6,13), end: new Date(2026,6,13), name:'拓展板设计期',     color:'#7c3aed', emoji:'🎨' },
  { start: new Date(2026,6,14), end: new Date(2026,6,17), name:'焊接与小车结构期', color:'#f59e0b', emoji:'🔧' },
  { start: new Date(2026,6,18), end: new Date(2026,6,28), name:'单片机学习期',     color:'#0891b2', emoji:'💻' },
  { start: new Date(2026,6,29), end: new Date(2026,7, 1), name:'电赛',            color:'#ef4444', emoji:'🏁' },
  { start: new Date(2026,7, 2), end: new Date(2026,7,29), name:'暑期提升期',       color:'#10b981', emoji:'🏡' },
];

function getPhase(d) {
  for (let p of PHASES) {
    if (d >= p.start && d <= p.end) return p;
  }
  return null;
}

// Generate tasks for a given date
function generateTasks(d) {
  const ds = dateStr(d);
  let core = [];
  let habits = [];
  let optional = [];

  const phase = getPhase(d);
  if (!phase) return { core, habits, optional };

  const phaseName = phase.name;

  // ── Helper: isSpecialDay ──
  // Aug 2 = rest/travel day
  if (ds === '2026-08-02') {
    // Rest day — only light habits
    habits = [
      { id:'meal',     label:'规律三餐',              time:'', optional:false },
      { id:'sleep',    label:'充足睡眠（≥7小时）',     time:'', optional:false },
      { id:'rest',     label:'好好休息，旅途平安 🧳',  time:'', optional:false },
    ];
    return { core, habits, optional };
  }

  // ── Core tasks by phase ──
  // 💡 上午9点开始，每段「50分钟专注 + 10分钟休息」，专注力有限更要劳逸结合
  switch (phaseName) {
    case '硬件学习期':
      core = [
        { id:'hw1', label:'电路基础学习',              time:'9:00-10:50', desc:'电压电流、电阻电容、二极管三极管基础（50+10节奏）' },
        { id:'hw2', label:'元器件识别与datasheet阅读',  time:'11:00-11:50', desc:'常见封装、引脚定义、芯片手册（轻量整理）' },
        { id:'hw3', label:'PCB设计基础入门',            time:'14:00-15:50', desc:'立创EDA界面操作、原理图绘制流程' },
        { id:'hw4', label:'焊接理论学习',               time:'16:00-17:50', desc:'焊接工具认识、手法教学视频、安全规范' },
      ];
      break;

    case '拓展板设计期':
      core = [
        { id:'pcb1', label:'原理图设计 + 元器件选型',   time:'9:00-10:50', desc:'根据需求绘制原理图，确认封装和型号' },
        { id:'pcb2', label:'PCB布局规划',               time:'11:00-11:50', desc:'元器件摆放、初步布局（轻量收尾）' },
        { id:'pcb3', label:'布线走线 + DRC检查',        time:'14:00-15:50', desc:'自动/手动布线，设计规则检查，修正错误' },
        { id:'pcb4', label:'收尾完善 + 导出3D模型',     time:'16:00-17:50', desc:'丝印调整、最终检查、导出STEP给机械组' },
      ];
      break;

    case '焊接与小车结构期':
      if (ds === '2026-07-14') {
        core = [
          { id:'sld1', label:'焊接练习（废板练手）',    time:'9:00-10:50', desc:'用废板练习焊点，熟悉烙铁温度和焊锡流动性' },
          { id:'sld2', label:'正式焊接拓展板（上）',     time:'11:00-11:50', desc:'焊接电阻、电容、排针排母，注意极性' },
          { id:'sld3', label:'正式焊接拓展板（下）',     time:'14:00-15:50', desc:'完成剩余元器件焊接，检查焊点质量' },
          { id:'sld4', label:'测试通断 + 修补完善',     time:'16:00-17:50', desc:'万用表测通断，补焊虚焊点，确保电气连接正常' },
        ];
      } else if (ds === '2026-07-17') {
        core = [
          { id:'buf1', label:'整车功能检查 + 完善细节',  time:'9:00-10:50', desc:'测试所有机械结构和电气连接，查漏补缺' },
          { id:'buf2', label:'交车给队友 🎉',            time:'11:00-11:50', desc:'整理文档+交接，队友开始调试' },
        ];
        habits = [
          { id:'exercise', label:'运动30分钟',             time:'16:00-16:30', optional:false },
          { id:'meal',     label:'规律三餐',              time:'', optional:false },
          { id:'sleep',    label:'充足睡眠（≥7小时）',     time:'23:00前', optional:false },
          { id:'fun',      label:'下午自由放松 🎮',       time:'14:00后', optional:false },
        ];
          return { core, habits, optional };
      } else {
        core = [
          { id:'car1', label:'画小车结构 + 零件设计',    time:'9:00-10:50', desc:'底盘、悬挂、模块安装位→导出加工图纸' },
          { id:'car2', label:'结构优化 + 导出文件',       time:'11:00-11:50', desc:'干涉检查、尺寸确认、导出DXF/STEP' },
          { id:'car3', label:'零件加工（3D打印/切割）',   time:'14:00-15:50', desc:'打印结构件、切割板材、清理支撑' },
          { id:'car4', label:'组装小车 + 初步调试',       time:'16:00-17:50', desc:'安装电机轮子、固定拓展板、走线整理' },
        ];
      }
      break;

    case '单片机学习期':
      core = [
        { id:'mcu1', label:'STM32基础入门',             time:'9:00-10:50', desc:'GPIO、时钟树、寄存器操作、HAL库结构' },
        { id:'mcu2', label:'复习巩固 + 小练习',          time:'11:00-11:50', desc:'回顾上午内容，写简单程序验证（轻量）' },
        { id:'mcu3', label:'通信协议与外设驱动',        time:'14:00-15:50', desc:'I2C/SPI/UART驱动传感器和模块' },
        { id:'mcu4', label:'综合实践 + 动手调试',       time:'16:00-17:50', desc:'结合传感器写控制逻辑，烧录调试' },
      ];
      break;

    case '电赛':
      core = [
        { id:'race',  label:'全力备战电赛 🏁',             time:'全天', desc:'小车最终调试、赛前检查、正式比赛' },
      ];
      break;

    case '暑期提升期':
      core = [
        { id:'chs1', label:'全向轮底盘设计（上）',      time:'9:00-10:20', desc:'RoboMaster底盘结构：底盘框架、电机布局' },
        { id:'chs2', label:'全向轮底盘设计（下）',      time:'10:30-12:00', desc:'悬挂机构、减震设计、模块安装位置' },
        { id:'exer', label:'锻炼身体 💪',                time:'14:00-15:30', desc:'有氧运动+力量训练（减脂为主，1-1.5小时）' },
        { id:'mcu_h',label:'单片机学习 / 嵌入式小车',    time:'15:30-17:20', desc:'独立智能小车项目：从零搭建软硬件' },
      ];
      optional = [
        { id:'kaoyan', label:'了解考研信息（零散时间）', time:'22:00-22:30', desc:'院校方向、考试科目、分数线、报录比' },
      ];
      break;
  }

  // ── Habits (shared) ──
  if (phaseName === '电赛') {
    // During competition: only basic habits
    habits = [
      { id:'meal',     label:'规律三餐',              time:'', optional:false },
      { id:'sleep',    label:'充足睡眠（≥7小时）',     time:'23:00前', optional:false },
    ];
  } else if (phaseName === '暑期提升期') {
    habits = [
      { id:'meal',     label:'规律三餐',              time:'', optional:false },
      { id:'sleep',    label:'充足睡眠（≥7小时）',     time:'23:30前', optional:false },
      { id:'fun',      label:'晚上娱乐 / 朋友聚会',   time:'19:00-22:00', optional:false },
    ];
  } else {
    // School phases
    habits = [
      { id:'exercise', label:'运动30分钟',             time:'18:00-18:30', optional:false },
      { id:'meal',     label:'规律三餐',              time:'', optional:false },
      { id:'sleep',    label:'充足睡眠（≥7小时）',     time:'23:00前', optional:false },
      { id:'fun',      label:'适当娱乐放松',          time:'19:30-22:00', optional:false },
    ];
  }

  return { core, habits, optional };
}

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════

let currentDate = new Date(START_DATE);
let reviewData = {};  // { '2026-07-11': 'text...', ... }

function loadReviewData() {
  try {
    const raw = localStorage.getItem('summer-plan-reviews');
    if (raw) reviewData = JSON.parse(raw);
    else reviewData = {};
  } catch(e) { reviewData = {}; }
}

function saveReviewData() {
  localStorage.setItem('summer-plan-reviews', JSON.stringify(reviewData));
}

    '今天不想跑，所以才去跑。——村上春树',

    '认知决定上限，执行决定下限。',

  ];
  const start = new Date(currentDate.getFullYear(), 0, 0);
  const diff = currentDate - start;
  const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
  const idx = dayOfYear % quotes.length;
  let quoteText = quotes[idx];
  const phase = getPhase(currentDate);
  if (phase && phase.name === '暑期提升期') {
    const totalDays = 28;
    const dayStart = new Date(2026, 7, 2);
    const elapsed = Math.max(1, Math.floor((currentDate - dayStart) / (1000*60*60*24)) + 1);
    const pct = Math.min(100, Math.round(elapsed / totalDays * 100));
    quoteText += `<br><span class="chassis-progress">🔧 全向轮底盘进度：${elapsed}/${totalDays} 天（${pct}%）— 回学校前必须画完！</span>`;

function renderReview() {
  renderQuote();
  const ds = dateStr(currentDate);
  const textarea = document.getElementById('reviewInput');
  const hint = document.getElementById('reviewHint');
  const saved = reviewData[ds] || '';
  if (textarea.value !== saved) textarea.value = saved;
  hint.textContent = saved ? '💾 已保存 · ' + saved.length + '字' : '💾 输入后自动保存';
}

// Auto-save review on input
function setupReviewAutoSave() {
  const textarea = document.getElementById('reviewInput');
  let saveTimer;
  textarea.addEventListener('input', () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      const ds = dateStr(currentDate);
      reviewData[ds] = textarea.value;
      saveReviewData();
      renderReview();
      renderSidebar(); // update dot if review counts toward completion
    }, 600);
  });
}

function toggleReviewHistory() {
  const list = document.getElementById('reviewHistory');
  const toggle = document.getElementById('reviewToggle');
  if (list.style.display === 'none') {
    // Build history list
    const entries = Object.entries(reviewData).filter(([k,v]) => v.trim()).sort((a,b) => b[0].localeCompare(a[0]));
    if (entries.length === 0) {
      list.innerHTML = '<div style="padding:14px;color:#9ca3af;font-size:.82rem;">暂无复盘记录</div>';
    } else {
      list.innerHTML = entries.map(([k,v]) => {
        const preview = v.replace(/\n/g, ' ').substring(0, 60);
        return `<div class="review-history-item" onclick="goDate('${k}'); toggleReviewHistory();">
          <div class="rh-date">📅 ${k}</div>
          <div class="rh-preview">${preview}${v.length>60?'...':''}</div>
        </div>`;
      }).join('');
    }
    list.style.display = 'block';
    toggle.innerHTML = '📅 收起历史 ▾';
  } else {
    list.style.display = 'none';
    toggle.innerHTML = '📅 查看历史复盘 ▸';
  }
}

function dateStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function dateEq(a, b) {
  return a.getFullYear()===b.getFullYear() &&
         a.getMonth()===b.getMonth() &&
         a.getDate()===b.getDate();
}

function loadData() {
  try {
    const raw = localStorage.getItem('summer-plan-2026');
    if (raw) data = JSON.parse(raw);
    else data = {};
  } catch(e) { data = {}; }
}

function saveData() {
  localStorage.setItem('summer-plan-2026', JSON.stringify(data));
}

function getDayData(d) {
  const ds = dateStr(d);
  if (!data[ds]) data[ds] = {};
  return data[ds];
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  let lastMonth = -1;
  const months = ['7月', '8月'];

  for (let d = new Date(START_DATE); d <= END_DATE; d.setDate(d.getDate()+1)) {
    const m = d.getMonth();
    if (m !== lastMonth) {
      html += `<div class="month-label">2026年${months[m-6]}</div>`;
      lastMonth = m;
    }
    const ds = dateStr(d);
    const dayData = data[ds] || {};
    const tasks = generateTasks(d);
    const allTasks = [...tasks.core, ...tasks.habits, ...tasks.optional];
    const total = allTasks.length;
    const done = allTasks.filter(t => dayData[t.id]).length;
    let dotClass = 'future';
    if (total > 0) {
      if (done === total) dotClass = 'full';
      else if (done > 0) dotClass = 'part';
      else dotClass = 'none';
    }
    // Check if date is in the past
    const today = new Date(); today.setHours(0,0,0,0);
    const dd = new Date(d); dd.setHours(0,0,0,0);
    if (dd > today) dotClass = 'future';
    else if (total === 0) dotClass = 'future';

    const active = dateEq(d, currentDate) ? ' active' : '';
    const weekdays = ['日','一','二','三','四','五','六'];
    html += `
      <div class="date-row${active}" onclick="goDate('${ds}')" title="${ds} · ${done}/${total}">
        <span class="dot ${dotClass}"></span>
        <span class="day-num">${d.getDate()}</span>
        <span class="weekday">${weekdays[d.getDay()]}</span>
      </div>`;
  }
  sb.innerHTML = html;

  // Scroll active into view
  setTimeout(() => {
    const activeRow = sb.querySelector('.date-row.active');
    if (activeRow) activeRow.scrollIntoView({ block:'nearest', behavior:'smooth' });
  }, 100);
}

function renderMain() {
  const ds = dateStr(currentDate);
  const tasks = generateTasks(currentDate);
  const dayData = getDayData(currentDate);

  const weekdays = ['日','一','二','三','四','五','六'];
  document.getElementById('bigDate').textContent =
    `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月${currentDate.getDate()}日`;
  document.getElementById('bigWeekday').textContent =
    `星期${weekdays[currentDate.getDay()]}`;

  // Phase tag
  const phase = getPhase(currentDate);
  const phaseTag = document.getElementById('phaseTag');
  if (phase) {
    phaseTag.textContent = `${phase.emoji} ${phase.name}`;
    phaseTag.style.background = phase.color;
  } else {
    phaseTag.textContent = '自由日';
    phaseTag.style.background = '#9ca3af';
  }

  // Render core tasks
  const coreDiv = document.getElementById('coreTasks');
  if (tasks.core.length === 0) {
    coreDiv.innerHTML = '<div style="color:#9ca3af;font-size:.85rem;padding:8px 0;">今日无核心任务 🎉</div>';
    document.getElementById('coreBar').style.width = '0%';
    document.getElementById('coreProgress').textContent = '0/0 完成';
  } else {
    coreDiv.innerHTML = tasks.core.map(t => {
      const checked = dayData[t.id] ? ' checked' : '';
      const doneClass = dayData[t.id] ? ' done' : '';
      return `
        <div class="task-item${doneClass}">
          <input class="task-check" type="checkbox" data-id="${t.id}"${checked} onchange="toggleTask('${t.id}', this.checked)">
          <span class="task-label">${t.label}${t.desc ? `<br><small style="color:#9ca3af;">${t.desc}</small>` : ''}</span>
          ${t.time ? `<span class="task-time">${t.time}</span>` : ''}
        </div>`;
    }).join('');
    updateProgress('core', tasks.core, dayData);
  }

  // Render habits
  const habitDiv = document.getElementById('habitTasks');
  habitDiv.innerHTML = tasks.habits.map(t => {
    const checked = dayData[t.id] ? ' checked' : '';
    const doneClass = dayData[t.id] ? ' done' : '';
    return `
      <div class="task-item${doneClass}">
        <input class="task-check" type="checkbox" data-id="${t.id}"${checked} onchange="toggleTask('${t.id}', this.checked)">
        <span class="task-label">${t.label}</span>
        ${t.time ? `<span class="task-time">${t.time}</span>` : ''}
      </div>`;
  }).join('');
  updateProgress('habit', tasks.habits, dayData);

  // Optional
  const optCard = document.getElementById('optionalCard');
  const optDiv = document.getElementById('optionalTasks');
  if (tasks.optional.length > 0) {
    optCard.style.display = 'block';
    optDiv.innerHTML = tasks.optional.map(t => {
      const checked = dayData[t.id] ? ' checked' : '';
      const doneClass = dayData[t.id] ? ' done' : '';
      return `
        <div class="task-item${doneClass}">
          <input class="task-check" type="checkbox" data-id="${t.id}"${checked} onchange="toggleTask('${t.id}', this.checked)">
          <span class="task-label">${t.label}${t.desc ? `<br><small style="color:#9ca3af;">${t.desc}</small>` : ''}</span>
          <span class="task-optional">可选</span>
          ${t.time ? `<span class="task-time">${t.time}</span>` : ''}
        </div>`;
    }).join('');
  } else {
    optCard.style.display = 'none';
  }

  renderQuote();
  renderReview();
  renderHeatmap();
  renderSidebar(); // refresh dots
}

function updateProgress(section, tasks, dayData) {
  const total = tasks.length;
  const done = tasks.filter(t => dayData[t.id]).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById(section+'Bar').style.width = pct+'%';
  document.getElementById(section+'Progress').textContent = `${done}/${total} 完成`;
}

function toggleTask(taskId, checked) {
  const ds = dateStr(currentDate);
  if (!data[ds]) data[ds] = {};
  data[ds][taskId] = checked;
  saveData();
  renderMain();
}

// ── Heatmap ──
function renderHeatmap() {
  const hm = document.getElementById('heatmap');
  let html = '';
  for (let d = new Date(START_DATE); d <= END_DATE; d.setDate(d.getDate()+1)) {
    const ds = dateStr(d);
    const dayData = data[ds] || {};
    const tasks = generateTasks(d);
    const allTasks = [...tasks.core, ...tasks.habits, ...tasks.optional];
    const total = allTasks.length;
    const done = allTasks.filter(t => dayData[t.id]).length;

    let cls = 'future';
    if (total > 0) {
      if (done === total) cls = 'full';
      else if (done > 0) cls = 'part';
      else cls = 'none';
    }
    const today = new Date(); today.setHours(0,0,0,0);
    const dd = new Date(d); dd.setHours(0,0,0,0);
    if (dd > today) cls = 'future';
    else if (total === 0) cls = 'future';

    const active = dateEq(d, currentDate) ? ' style="outline:2px solid #5b6fff;z-index:2;"' : '';
    html += `<div class="heat-cell ${cls}"${active} onclick="goDate('${ds}')" title="${ds} · ${done}/${total}"></div>`;
  }
  hm.innerHTML = html;
}

// ── Export / Import ──
function exportData() {
  const exportObj = { tasks: data, reviews: reviewData, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `summer-plan-backup-${dateStr(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.tasks && !imported.reviews) { alert('❌ 文件格式不正确'); return; }
      const d = imported.exportedAt ? new Date(imported.exportedAt).toLocaleString() : '未知时间';
      if (!confirm(`即将导入 ${d} 的备份。\n\n当前数据将被覆盖，确定继续？`)) return;
      if (imported.tasks) { data = imported.tasks; saveData(); }
      if (imported.reviews) { reviewData = imported.reviews; saveReviewData(); }
      alert('✅ 导入成功！');
      renderMain();
    } catch(err) { alert('❌ 解析失败：' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════

function goDate(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  currentDate = new Date(y, m-1, d);
  renderMain();
}

function shiftDate(delta) {
  const next = new Date(currentDate);
  next.setDate(next.getDate() + delta);
  if (next >= START_DATE && next <= END_DATE) {
    currentDate = next;
    renderMain();
  }
}

function goToday() {
  currentDate = clampToPlanDate(new Date());
  renderMain();
}

// ── Keyboard navigation ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { e.preventDefault(); shiftDate(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); shiftDate(1); }
  if (e.key === 't') { e.preventDefault(); goToday(); }
});

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════

loadData();
loadReviewData();
setupReviewAutoSave();
// Default to today (clamped to plan range)
currentDate = clampToPlanDate(new Date());
renderMain();
</script>
